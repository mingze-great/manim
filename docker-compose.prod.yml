version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: manim-postgres-prod
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-manim_secret_password}
      POSTGRES_DB: manim_prod
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - manim-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manim-backend-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-manim_secret_password}@postgres:5432/manim_prod
    env_file:
      - .env.production
    volumes:
      - ./videos/prod:/app/videos
      - ./logs/prod:/app/logs
    networks:
      - manim-prod-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: manim-frontend-prod
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./videos/prod:/usr/share/nginx/videos:ro
    networks:
      - manim-prod-network

networks:
  manim-prod-network:
    driver: bridge

volumes:
  postgres-prod-data:
