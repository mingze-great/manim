name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DEPLOY_HOST: 8.136.60.253
  DEPLOY_USER: root
  DEPLOY_PATH: /opt/manim

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "frontend/dist/*"
          target: ${{ env.DEPLOY_PATH }}/frontend/dist/
          strip_components: 1

      - name: Build frontend on server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}/frontend
            npm ci
            npm run build

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy backend files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "backend/*"
          target: ${{ env.DEPLOY_PATH }}/backend/
          exclude:
            - "**/__pycache__/**"
            - "**/*.pyc"
            - "**/.env"

      - name: Restart backend service
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}/backend
            pip install -r requirements.txt --quiet
            systemctl restart manim
            sleep 2
            systemctl status manim --no-pager || echo "Service restart check failed"

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    
    steps:
      - name: Check API health
        run: |
          curl -s http://${{ env.DEPLOY_HOST }}/health || exit 1
          
      - name: Check frontend
        run: |
          curl -s http://${{ env.DEPLOY_HOST }}/ | grep -q "Manim" || exit 1
